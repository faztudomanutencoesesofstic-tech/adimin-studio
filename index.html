<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essência Feminina - Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        /* ==========================================
           1. ESTILOS DO CODEPEN (CSS UNIFICADO)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #FAF6F0;
            color: #2E1A1C;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Moldura elegante simulando o aplicativo */
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: #FAF6F0;
            border: 4px solid #2E1A1C;
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Cartão Branco Interno */
        .card {
            background-color: #FFFFFF;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(46, 26, 28, 0.05);
            width: 100%;
        }

        /* Cabeçalhos e Títulos */
        h2 {
            color: #2E1A1C;
            font-size: 22px;
            text-align: center;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .gold-line {
            width: 100%;
            height: 2px;
            background-color: #C5A880;
            margin-bottom: 25px;
        }

        h3 {
            color: #2E1A1C;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 1px solid #EADCC9;
            padding-bottom: 5px;
        }

        /* Formulários e Inputs */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #5A4A42;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #EADCC9;
            border-radius: 12px;
            background-color: #FAF6F0;
            color: #2E1A1C;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #2E1A1C;
            background-color: #FFFFFF;
        }

        /* Botões */
        button {
            width: 100%;
            padding: 15px;
            background-color: #2E1A1C;
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 5px;
        }

        button:hover {
            background-color: #4A2E31;
        }

        /* Links de Alternância */
        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2E1A1C;
            font-size: 14px;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Telas Ocultas por Padrão */
        .screen {
            display: none;
        }

        .active-screen {
            display: block;
        }

        /* Estilos do Painel de Controle Ativo */
        .client-box {
            background-color: #FAF6F0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #C5A880;
        }

        .logout-btn {
            background-color: #7A2E2E;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="screen-login" class="screen active-screen">
            <div class="card">
                <h2>Painel Studio - Login</h2>
                <div class="gold-line"></div>
                
                <div class="form-group">
                    <label>Usuário Administrador:</label>
                    <input type="text" id="login-user" placeholder="Ex: adolfo">
                </div>
                
                <div class="form-group">
                    <label>Senha de Acesso:</label>
                    <input type="password" id="login-pass" placeholder="........">
                </div>
                
                <button onclick="realizarLogin()">Entrar no Painel</button>
                <span class="toggle-link" onclick="mudarTela('screen-cadastro')">Cadastrar Novo Administrador</span>
            </div>
        </div>

        <div id="screen-cadastro" class="screen">
            <div class="card">
                <h2>Painel Studio - Cadastro</h2>
                <div class="gold-line"></div>
                
                <div class="form-group">
                    <label>Escolha um Usuário:</label>
                    <input type="text" id="reg-user" placeholder="Ex: adolfo">
                </div>
                
                <div class="form-group">
                    <label>Escolha uma Senha:</label>
                    <input type="password" id="reg-pass" placeholder="........">
                </div>
                
                <button onclick="realizarCadastro()">Salvar Cadastro</button>
                <span class="toggle-link" onclick="mudarTela('screen-login')">Voltar para o Login</span>
            </div>
        </div>

        <div id="screen-dashboard" class="screen">
            <div class="card">
                <h2>Controle Interno</h2>
                <div class="gold-line"></div>
                
                <h3>Buscar Cliente</h3>
                <div class="form-group">
                    <label>Telefone da Cliente:</label>
                    <input type="tel" id="search-phone" placeholder="Ex: 71999999999">
                </div>
                <button onclick="buscarCliente()">Consultar Telefone</button>
                
                <div id="client-result" style="display: none;">
                    <div class="client-box">
                        <p><strong>Nome:</strong> <span id="res-name">...</span></p>
                        <p><strong>Pontos Atuais:</strong> <span id="res-points">0</span></p>
                    </div>
                    
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Quantidade de Pontos a Lançar:</label>
                        <input type="number" id="add-points-input" placeholder="Ex: 10">
                    </div>
                    <button onclick="lancarPontos()" style="background-color: #C5A880;">Confirmar Lançamento</button>
                </div>

                <button onclick="fazerLogout()" class="logout-btn">Sair do Painel</button>
            </div>
        </div>

    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        // ATENÇÃO: Substitua os dados abaixo pelas chaves do seu projeto Firebase se necessário!
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "SEU_AUTH_DOMAIN_AQUI",
            databaseURL: "SEU_DATABASE_URL_AQUI",
            projectId: "SEU_PROJECT_ID_AQUI",
            storageBucket: "SEU_STORAGE_BUCKET_AQUI",
            messagingSenderId: "SEU_MESSAGING_ID_AQUI",
            appId: "SEU_APP_ID_AQUI"
        };

        // Inicializa o Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // Função para alternar de tela no aplicativo
        function mudarTela(telaId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active-screen');
            });
            document.getElementById(telaId).classList.add('active-screen');
        }

        // 1. Lógica de Cadastro de Administrador
        function realizarCadastro() {
            const user = document.getElementById('reg-user').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value.trim();

            if (!user || !pass) {
                alert("Preencha todos os campos para cadastrar!");
                return;
            }

            database.ref('admins/' + user).set({
                password: pass
            }).then(() => {
                alert("Administrador cadastrado com sucesso!");
                mudarTela('screen-login');
                document.getElementById('reg-user').value = '';
                document.getElementById('reg-pass').value = '';
            }).catch(error => {
                alert("Erro ao salvar cadastro: " + error.message);
            });
        }

        // 2. Lógica de Login do Administrador
        function realizarLogin() {
            const user = document.getElementById('login-user').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value.trim();

            if (!user || !pass) {
                alert("Por favor, digite o usuário e a senha.");
                return;
            }

            database.ref('admins/' + user).once('value').then(snapshot => {
                if (snapshot.exists() && snapshot.val().password === pass) {
                    alert("Acesso autorizado!");
                    mudarTela('screen-dashboard');
                } else {
                    alert("Usuário ou senha incorretos!");
                }
            });
        }

        // 3. Buscar Cliente por Telefone
        let clienteAtualRef = null;

        function buscarCliente() {
            const phone = document.getElementById('search-phone').value.trim();
            if (!phone) {
                alert("Digite o telefone da cliente para consultar!");
                return;
            }

            clienteAtualRef = database.ref('clientes/' + phone);
            
            clienteAtualRef.once('value').then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('res-name').innerText = data.nome || "Sem Nome";
                    document.getElementById('res-points').innerText = data.pontos || 0;
                    document.getElementById('client-result').style.display = 'block';
                } else {
                    alert("Cliente não encontrada! Verifique o número.");
                    document.getElementById('client-result').style.display = 'none';
                }
            });
        }

        // 4. Lançar Pontos para a Cliente
        function lancarPontos() {
            const pontosParaAdicionar = parseInt(document.getElementById('add-points-input').value);
            if (isNaN(pontosParaAdicionar) || pontosParaAdicionar <= 0) {
                alert("Digite uma quantidade válida de pontos!");
                return;
            }

            if (clienteAtualRef) {
                clienteAtualRef.once('value').then(snapshot => {
                    let pontosAtuais = snapshot.val().pontos || 0;
                    let novosPontos = pontosAtuais + pontosParaAdicionar;

                    clienteAtualRef.update({ pontos: novosPontos }).then(() => {
                        alert("Pontos creditados com sucesso!");
                        document.getElementById('res-points').innerText = novosPontos;
                        document.getElementById('add-points-input').value = '';
                    });
                });
            }
        }

        // 5. Logout
        function fazerLogout() {
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('client-result').style.display = 'none';
            document.getElementById('search-phone').value = '';
            mudarTela('screen-login');
        }

        // Registro Automático do Service Worker (Mantém o PWA ativo)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker registrado com sucesso!"))
            .catch(err => console.log("Erro no Service Worker:", err));
        }
    </script>
</body>
</html>

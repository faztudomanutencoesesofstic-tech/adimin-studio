<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essência Feminina - Admin</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
          --marsala: #4A121A;
          --marsala-light: #6E222D;
          --gold: #D4AF37;
          --bg-cream: #FAF6F0;
        }

        body {
          font-family: 'Montserrat', sans-serif;
          background-color: #CBD5E1; 
          margin: 0;
          padding: 10px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .phone-container {
          width: 100%;
          max-width: 380px;
          background-color: var(--bg-cream);
          border-radius: 40px;
          box-shadow: 0 15px 35px rgba(0,0,0,0.15);
          border: 8px solid #1a1a1a;
          overflow: hidden;
          box-sizing: border-box;
          min-height: 690px;
          display: flex;
          flex-direction: column;
        }

        .app-screen { padding: 22px; display: flex; flex-direction: column; flex: 1; }
        .hidden { display: none !important; }

        .admin-title {
          font-size: 1.15rem;
          color: var(--marsala);
          font-weight: 600;
          margin-top: 0;
          border-bottom: 2px solid var(--gold);
          padding-bottom: 8px;
        }

        .admin-title-requests {
          font-size: 1rem;
          color: var(--marsala);
          font-weight: 600;
          margin-top: 0;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .badge {
          background-color: #D32F2F;
          color: white;
          padding: 2px 8px;
          border-radius: 12px;
          font-size: 0.75rem;
        }

        .card-box {
          background: white;
          border-radius: 20px;
          padding: 20px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.02);
          border: 1px solid #F0E6DF;
          margin-bottom: 15px;
        }

        .toggle-link {
          color: var(--marsala);
          font-size: 0.78rem;
          text-align: center;
          margin-top: 15px;
          margin-bottom: 0;
          cursor: pointer;
          text-decoration: underline;
          font-weight: 600;
        }

        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.75rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        .input-group input {
          padding: 12px;
          border: 1px solid #DCD0C9;
          border-radius: 10px;
          font-family: 'Montserrat', sans-serif;
          font-size: 0.9rem;
          color: #1a1a1a;
          background-color: #fff;
        }
        .input-group input:focus { outline: none; border-color: var(--marsala); }

        .btn-main {
          width: 100%;
          padding: 14px;
          background-color: var(--marsala);
          color: white;
          border: none;
          border-radius: 12px;
          font-weight: 600;
          font-size: 0.9rem;
          cursor: pointer;
        }

        .btn-logout {
          width: 100%;
          padding: 8px;
          background-color: transparent;
          color: #a29591;
          border: none;
          cursor: pointer;
          font-size: 0.75rem;
          margin-top: auto;
          text-decoration: underline;
        }

        .request-item { background: #FFF7F7; border: 1px solid #F5E6E6; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .btn-approve { background-color: #2E7D32; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; font-weight: 600; margin-right: 5px; }
        .btn-reject { background-color: transparent; color: #C62828; border: 1px solid #C62828; padding: 5px 11px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="phone-container">
  <div id="admin-screen" class="app-screen">
    
    <div id="admin-login-area" class="card-box" style="margin-top: 30px;">
      <h2 class="admin-title">Painel Studio - Login</h2>
      <div class="input-group">
        <label>Usuário Administrador:</label>
        <input type="text" id="admin-login-user" placeholder="Ex: adolfo">
      </div>
      <div class="input-group">
        <label>Senha de Acesso:</label>
        <input type="password" id="admin-login-pass" placeholder="••••••••">
      </div>
      <button class="btn-main" onclick="handleAdminLogin()">Entrar no Painel</button>
      <p class="toggle-link" onclick="showAdminScreen('register')">Cadastrar Novo Administrador</p>
    </div>

    <div id="admin-register-area" class="card-box hidden" style="margin-top: 30px;">
      <h2 class="admin-title">Cadastrar Administrador</h2>
      <div class="input-group">
        <label>Defina o Usuário:</label>
        <input type="text" id="admin-reg-user" placeholder="Ex: adolfo">
      </div>
      <div class="input-group">
        <label>Defina a Senha:</label>
        <input type="password" id="admin-reg-pass" placeholder="Senha segura">
      </div>
      <button class="btn-main" onclick="handleAdminRegister()">Registrar Admin</button>
      <p class="toggle-link" onclick="showAdminScreen('login')">Voltar para o Login</p>
    </div>

    <div id="admin-main-area" class="hidden">
      <div class="card-box">
        <h2 class="admin-title">Painel do Studio</h2>
        <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">Envie pontos informando o celular cadastrado:</p>
        <div class="input-group">
          <label>Celular da Cliente (apenas números com DDD):</label>
          <input type="tel" id="admin-client-phone" placeholder="Ex: 71999999999">
        </div>
        <div class="input-group">
          <label>Quantidade de Pontos:</label>
          <input type="number" id="admin-points-amount" placeholder="Ex: 50">
        </div>
        <button class="btn-main" onclick="addPointsAdmin()">Enviar Pontos</button>
      </div>

      <div class="card-box" style="margin-top: 15px;">
        <h3 class="admin-title-requests">Pedidos de Resgate Pendentes <span id="admin-badge" class="badge hidden">0</span></h3>
        <div id="admin-requests-list">
          <p style="font-size: 0.85rem; color: #777;">Nenhuma solicitação no momento.</p>
        </div>
      </div>
      
      <button class="btn-logout" onclick="handleAdminLogout()">Sair do Painel Admin</button>
    </div>
  </div>
</div>

<script>
// Diagnóstico de carregamento inicial
if (typeof firebase === 'undefined') {
  alert("Erro de Conexão: Os scripts do Firebase não carregaram. Verifique sua internet.");
}

const firebaseConfig = {
  apiKey: "AIzaSyAOAACf0SRMozCLcd3eAXIRqrb8uvaSJWA",
  authDomain: "essencia-feninina.firebaseapp.com",
  databaseURL: "https://essencia-feninina-default-rtdb.firebaseio.com",
  projectId: "essencia-feninina",
  storageBucket: "essencia-feninina.firebasestorage.app",
  messagingSenderId: "646470186154",
  appId: "1:646470186154:web:e109b6a4bbe9a1c67bccd3"
};

try {
  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();
  startAdminListener();
} catch (e) {
  alert("Erro Firebase: " + e.message);
}

function showAdminScreen(screen) {
  const loginArea = document.getElementById('admin-login-area');
  const registerArea = document.getElementById('admin-register-area');
  const mainArea = document.getElementById('admin-main-area');
  
  if(loginArea) loginArea.classList.add('hidden');
  if(registerArea) registerArea.classList.add('hidden');
  if(mainArea) mainArea.classList.add('hidden');
  
  if(screen === 'login' && loginArea) loginArea.classList.remove('hidden');
  if(screen === 'register' && registerArea) registerArea.classList.remove('hidden');
  if(screen === 'main' && mainArea) mainArea.classList.remove('hidden');
}

function handleAdminRegister() {
  const user = document.getElementById('admin-reg-user').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");
  const password = document.getElementById('admin-reg-pass').value.trim();
  
  if(!user || !password) { alert("Preencha todos os dados."); return; }
  
  db.ref('admins/' + user).set({
    usuario: user,
    senha: password
  }).then(() => {
    alert("Administrador cadastrado com sucesso!");
    showAdminScreen('login');
    document.getElementById('admin-reg-user').value = "";
    document.getElementById('admin-reg-pass').value = "";
  }).catch(err => alert("Erro ao cadastrar: " + err.message));
}

function handleAdminLogin() {
  const user = document.getElementById('admin-login-user').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");
  const password = document.getElementById('admin-login-pass').value.trim();
  
  if(!user || !password) { alert("Informe usuário e senha."); return; }
  
  db.ref('admins/' + user).once('value').then((snapshot) => {
    if(snapshot.exists() && snapshot.val().senha === password) {
      alert("Acesso autorizado!");
      showAdminScreen('main');
      document.getElementById('admin-login-pass').value = "";
    } else {
      alert("Usuário ou senha administrador inválidos.");
    }
  }).catch(err => alert("Erro ao conectar: " + err.message));
}

function handleAdminLogout() {
  showAdminScreen('login');
}

function addPointsAdmin() {
  const clientPhone = document.getElementById('admin-client-phone').value.replace(/\D/g, "");
  const pointsToAdd = parseInt(document.getElementById('admin-points-amount').value);
  
  if(!clientPhone || isNaN(pointsToAdd) || pointsToAdd <= 0) {
    alert("Insira celular e pontos válidos.");
    return;
  }
  
  const clientRef = db.ref('clientes/' + clientPhone);
  clientRef.once('value').then((snapshot) => {
    if(!snapshot.exists()) {
      alert("Esta cliente ainda não tem cadastro no aplicativo!");
      return;
    }
    
    const data = snapshot.val();
    let pontosAtuais = data.pontos || 0;
    let historicoAtual = Array.isArray(data.historico) ? data.historico : Object.values(data.historico || {});
    
    historicoAtual.push(`+${pointsToAdd} pontos recebidos do Studio.`);
    
    clientRef.update({
      pontos: pontosAtuais + pointsToAdd,
      historico: historicoAtual
    }).then(() => {
      alert(`Sucesso! ${pointsToAdd} pontos creditados.`);
      document.getElementById('admin-client-phone').value = "";
      document.getElementById('admin-points-amount').value = "";
    });
  }).catch(err => alert("Erro ao computar pontos: " + err.message));
}

function startAdminListener() {
  if (!db) return;
  db.ref('pedidos').on('value', (snapshot) => {
    const container = document.getElementById('admin-requests-list');
    const badge = document.getElementById('admin-badge');
    if(!container) return;
    
    if(!snapshot.exists()) {
      if(badge) badge.classList.add('hidden');
      container.innerHTML = "<p style='font-size: 0.85rem; color: #777;'>Nenhum pedido de resgate no momento.</p>";
      return;
    }
    
    let html = "";
    let count = 0;
    
    snapshot.forEach((childSnapshot) => {
      const reqId = childSnapshot.key;
      const req = childSnapshot.val();
      
      if(req.status === 'pendente') {
        count++;
        html += `
          <div class="request-item">
            <p style="margin: 0 0 8px 0; font-size: 0.85rem; color: #333;">
              <strong>${req.cliente} (Cel: ${req.clienteId})</strong> solicita resgatar <strong>${req.quantidade} pts</strong>.
            </p>
            <button class="btn-approve" onclick="processRequest('${reqId}', 'aprovar')">Confirmar</button>
            <button class="btn-reject" onclick="processRequest('${reqId}', 'recusar')">Recusar</button>
          </div>
        `;
      }
    });
    
    if(count > 0) {
      if(badge) {
        badge.innerText = count;
        badge.classList.remove('hidden');
      }
      container.innerHTML = html;
    } else {
      if(badge) badge.classList.add('hidden');
      container.innerHTML = "<p style='font-size: 0.85rem; color: #777;'>Nenhum pedido de resgate no momento.</p>";
    }
  }, (error) => {
    console.log("Aviso de regras do banco de dados (ignorar se não logado):", error.message);
  });
}

function processRequest(reqId, action) {
  const reqRef = db.ref('pedidos/' + reqId);
  reqRef.once('value').then((snapshot) => {
    if(!snapshot.exists()) return;
    const reqData = snapshot.val();
    
    if(action === 'aprovar') {
      const clientRef = db.ref('clientes/' + reqData.clienteId);
      return clientRef.once('value').then((cSnapshot) => {
        if(!cSnapshot.exists()) return;
        const cData = cSnapshot.val();
        const pontosAtuais = cData.pontos || 0;
        let historicoAtual = Array.isArray(cData.historico) ? cData.historico : Object.values(cData.historico || {});
        
        if(reqData.quantidade > pontosAtuais) {
          alert("A cliente não possui saldo suficiente.");
          return reqRef.update({ status: 'recusado_por_saldo_insuficiente' });
        }
        
        historicoAtual.push(`-${reqData.quantidade} pontos resgatados (Aprovado pelo Studio).`);
        
        return clientRef.update({
          pontos: pontosAtuais - reqData.quantidade,
          historico: historicoAtual
        }).then(() => {
          return reqRef.update({ status: 'aprovado' });
        });
      });
    } else {
      return reqRef.update({ status: 'recusado' });
    }
  }).then(() => {
    alert("Pedido processado!");
  }).catch(err => alert("Erro: " + err.message));
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
  .then(() => console.log("Instalador PWA Ativo"))
  .catch(err => console.log("Erro no instalador:", err));
}
</script>
</body>
</html>
